name: Scheduled Update
on:
  schedule:
    - cron: '0 */12 * * *'  # 每 12 小時執行一次
  workflow_dispatch:      # 讓你可以手動點按更新

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build
        run: curl -X POST -d {} https://api.netlify.com/build_hooks/github_action_refresh
